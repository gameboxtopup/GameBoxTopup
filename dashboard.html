<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo{
color:#ff9800;
font-size:28px;
font-weight:bold;
}

.profile{
background:#1e293b;
padding:12px 15px;
border-radius:10px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.card h2{
color:#ff9800;
margin-bottom:10px;
}

#ordersContainer{
display:flex;
flex-direction:column;
gap:15px;
}

.empty{
text-align:center;
padding:40px;
background:#1e293b;
border-radius:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#ff9800;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

</style>
</head>
<body>

<div class="header">

<div class="logo">
GameBox
</div>

<div class="profile">
My Account
</div>

</div>

<div class="card">

<h2>User Profile</h2>

<p id="userEmail">Loading...</p>

<p>Account Status: Active</p>

</div>

<div class="card">

<h2>My Orders</h2>

<div id="ordersContainer">

<div class="empty">
No Orders Yet
</div>

</div>

</div>

<button onclick="window.location.href='index.html'">
New Topup
</button>

</body>
</html>
