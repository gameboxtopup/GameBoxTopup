<style>
    


*{

body{

body:after{

}

}


body:after{

}


@keyframes float{

from{
transform:translateY(0);
}

to{
transform:translateY(80px);
}

}



.container{

padding:35px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.15);

backdrop-filter:blur(25px);

border-radius:35px;

box-shadow:

0 30px 80px #0008;

animation:show .7s;


}


@keyframes show{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;

}

}




.logo{

text-align:center;

color:#ff9800;

}

}



select,
input{


width:100%;

border-radius:15px;

border:none;

outline:none;


background:#ffffff15;

color:white;


}


option{

background:#07111f;

}



.price{


padding:20px;

border-radius:20px;

background:linear-gradient(135deg,#ff9800,#ff0066);

font-size:25px;

font-weight:bold;

text-align:center;

margin:20px 0;


}



button{


width:100%;

padding:16px;

border:none;

border-radius:18px;


background:white;

color:#111;

font-weight:800;

font-size:16px;

cursor:pointer;

transition:.3s;


}



button:hover{


transform:scale(1.05);

box-shadow:0 15px 30px #fff5;


}
.firenex-float{

right:20px;

}


.firenex-float span{

white-space:nowrap;

}


@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{

}

}
.error{

color:#ff5555;

text-align:center;

}



.home{

display:block;

text-align:center;

color:#aaa;

}
.payment-box{

padding:25px;

background:#ffffff10;

}


.payment-box h3{

}


.payment-box p{

color:#ff5555;

}


.qr{

max-width:100%;

margin:20px auto;

}

.payment-box input{

}


.payment-box button{

}
.upload-box{

margin-top:20px;

border:2px dashed #ff9800;

color:#ff9800;

}


.upload-box input{

}
</style>

</head>



<body>



<div class="container">

">

<label>

<a href="index.html" class="home">

if(qty<10 && qty){

<a href="GameBoxTopup.apk" class="firenex-float">

🔥 <span>FireNex App</span>

</a>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";



const firebaseConfig = {

apiKey:"AIzaSyAT1jHTWbIO8u-pMfF7liOz4rB6WIXSrIQ",
authDomain:"gamebox-58ca6.firebaseapp.com",
projectId:"gamebox-58ca6",
storageBucket:"gamebox-58ca6.firebasestorage.app"

};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

onAuthStateChanged(auth,(user)=>{

if(!user){
console.log("Not logged in");
}

});



window.placeInstagramOrder = async function(){

const submitBtn =
document.querySelector(".payment-box button");

if(submitBtn.disabled){
    return;
}

submitBtn.disabled = true;
submitBtn.innerText = "Submitting...";

try{

let file =
document.getElementById("paymentScreenshot").files[0];

let qty =
Number(document.getElementById("qty").value);



const instagramLink = document.getElementById("instagramLink").value.trim();

if(instagramLink === ""){
    alert("Enter Instagram link");
    submitBtn.disabled = false;
    submitBtn.innerText = "Submit Payment";
    return;
}

if(file && file.size > 8 * 1024 * 1024){
    alert("Screenshot must be under 8MB");
    submitBtn.disabled = false;
    submitBtn.innerText = "Submit Payment";
    return;
}

if(qty < 10 || qty > 100000){
    alert("Quantity must be between 10 - 100000");
    submitBtn.disabled = false;
    submitBtn.innerText = "Submit Payment";
    return;
}

if(!file){
    alert("Upload screenshot");
    submitBtn.disabled = false;
    submitBtn.innerText = "Submit Payment";
    return;
}

let rate =
Number(document.getElementById("service").value);

let price = qty * rate;

const serviceName =
document.getElementById("service").options[
document.getElementById("service").selectedIndex
].text;

const formData = new FormData();
formData.append("file", file);
formData.append("upload_preset", "gamebox");

const response = await fetch(
"https://api.cloudinary.com/v1_1/dsfhvnlqw/image/upload",
{
method:"POST",
body:formData
}
);

const data = await response.json();

const screenshot = data.secure_url;

const orderId =
"GB-" + Date.now().toString().slice(-8);

await addDoc(collection(db,"orders"),{

orderId: orderId,

email: auth.currentUser
? auth.currentUser.email
: "Instagram User",

uid: String(instagramLink),

link: String(instagramLink),

package:
serviceName +
" - " + qty +
" - Rs " + price.toFixed(2),

screenshot: screenshot,

status: "Processing",

time: new Date()

});


document.body.innerHTML = `

<div style="
background:#0f172a;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
padding:20px;
">

<div style="
background:#1e293b;
padding:30px;
border-radius:20px;
max-width:400px;
text-align:center;
color:white;
">

<h1 style="color:#00ff88;">
🎉 Order Submitted!
</h1>

<h2 style="color:#ff9800;">
Order ID:<br>
${orderId}
</h2>

<p>
Service: ${serviceName}<br>
Quantity: ${qty}<br>
Amount: Rs ${price.toFixed(2)}
</p>

<p>
Your order is now Processing.
</p>

<a href="https://wa.me/9779708567948"
style="
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#ff9800;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
">
Contact WhatsApp
</a>

<br><br>

<a href="index.html"
style="
display:inline-block;
padding:12px 20px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
">
Back Home
</a>

</div>

</div>

`;

}catch(error){

submitBtn.disabled = false;
submitBtn.innerText = "Submit Payment";

alert(error.message);

}

};

</script>
