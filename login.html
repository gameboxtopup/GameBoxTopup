<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>GameBox Login</title>

<style>

body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
background:#1e293b;
padding:30px;
border-radius:20px;
width:350px;
text-align:center;
}

h1{
color:#ff9800;
margin-bottom:25px;
}

input,button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:15px;
}

input{
background:#0f172a;
color:white;
}

button{
background:#ff9800;
color:white;
font-weight:bold;
cursor:pointer;
}

.google{
background:white;
color:black;
}

.phone{
background:#22c55e;
color:white;
}

a{
color:#ff9800;
text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

<h1>GameBox Login</h1>

<button
class="google"
onclick="googleLogin()">

Continue With Google

</button>

<input
type="text"
id="phone"
placeholder="+97798XXXXXXXX">

<div id="recaptcha-container"></div>

<button
class="phone"
onclick="sendOTP()">

Continue With Phone Number

</button>

<input
type="text"
id="otp"
placeholder="Enter OTP">

<button onclick="verifyOTP()">

Verify OTP

</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
RecaptchaVerifier,
signInWithPhoneNumber
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAT1jHTWbIO8u-pMfF7liOz4rB6WIXSrIQ",

authDomain: "gamebox-58ca6.firebaseapp.com",

projectId: "gamebox-58ca6",

storageBucket: "gamebox-58ca6.firebasestorage.app",

messagingSenderId: "562074668636",

appId: "1:562074668636:web:0fea328c5beefb4b5d2099"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.googleLogin = async function(){

const provider =
new GoogleAuthProvider();

try{

await signInWithPopup(auth,provider);

window.location.href = "/";

}
catch(error){

alert(error.message);

}

}

window.recaptchaVerifier =
new RecaptchaVerifier(
auth,
"recaptcha-container",
{}
);

window.sendOTP = async function(){

const phone =
document.getElementById("phone").value;

try{

const confirmationResult =
await signInWithPhoneNumber(
auth,
phone,
window.recaptchaVerifier
);

window.confirmationResult =
confirmationResult;

alert("OTP Sent!");

}
catch(error){

alert(error.message);

}

}

window.verifyOTP = async function(){

const otp =
document.getElementById("otp").value;

try{

await window.confirmationResult.confirm(otp);

alert("Login Successful!");

window.location.href = "/";

}
catch(error){

alert("Wrong OTP");

}

}

</script>

</body>

</html>
