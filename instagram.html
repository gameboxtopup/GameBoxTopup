<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>FireNex Instagram</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">


<style>
    


*{
box-sizing:border-box;
font-family:Poppins,sans-serif;
}


body{

margin:0;
min-height:100vh;

background:#050816;
color:white;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

}



/* floating lights */


body:before,
body:after{

content:"";

position:absolute;

width:350px;
height:350px;

border-radius:50%;

filter:blur(100px);

animation:float 8s infinite alternate;

}


body:before{

background:#ff007a;

top:-120px;
left:-100px;

}


body:after{

background:#2563eb;

bottom:-120px;
right:-100px;

animation-delay:2s;

}


@keyframes float{

from{
transform:translateY(0);
}

to{
transform:translateY(80px);
}

}



.container{


width:430px;

padding:35px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.15);

backdrop-filter:blur(25px);

border-radius:35px;

box-shadow:

0 30px 80px #0008;

animation:show .7s;


}


@keyframes show{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;

}

}




.logo{

text-align:center;

font-size:36px;

font-weight:800;

color:#ff9800;

}



.subtitle{

text-align:center;

color:#bbb;

margin-bottom:25px;

}




label{

color:#ddd;

font-size:14px;

}



select,
input{


width:100%;

margin:10px 0 20px;

padding:15px;

border-radius:15px;

border:none;

outline:none;


background:#ffffff15;

color:white;


}


option{

background:#07111f;

}



.price{


padding:20px;

border-radius:20px;

background:linear-gradient(135deg,#ff9800,#ff0066);

font-size:25px;

font-weight:bold;

text-align:center;

margin:20px 0;


}



button{


width:100%;

padding:16px;

border:none;

border-radius:18px;


background:white;

color:#111;

font-weight:800;

font-size:16px;

cursor:pointer;

transition:.3s;


}



button:hover{


transform:scale(1.05);

box-shadow:0 15px 30px #fff5;


}
.firenex-float{

position:fixed;

right:20px;
bottom:20px;

height:60px;
padding:0 22px;

border-radius:50px;

background:linear-gradient(135deg,#ff9800,#ff0066);

display:flex;
align-items:center;
justify-content:center;
gap:8px;

font-size:18px;
font-weight:700;

text-decoration:none;
color:white;

box-shadow:0 0 30px #ff9800;

animation:pulse 2s infinite;

z-index:999;

}


.firenex-float span{

white-space:nowrap;

}


@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}
.error{

color:#ff5555;

text-align:center;

}



.home{

display:block;

text-align:center;

margin-top:20px;

color:#aaa;

text-decoration:none;

}


</style>

</head>



<body>



<div class="container">


<div class="logo">

🔥 FireNex

</div>


<div class="subtitle">

Instagram Growth Service

</div>



<label>
Select Service
</label>


<select id="service" onchange="calc()">


<option value="0.07">

❤️ Likes - Lifetime Undrop

</option>


<option value="0.40">

👥 Followers VIP

</option>


<option value="0.05">

👁 Views Refill

</option>




</select>



<label>
Instagram Link
</label>


<input

placeholder="https://instagram.com/..."

>



<label>
Quantity
</label>


<input

id="qty"

type="number"

placeholder="10 - 100000"

oninput="calc()"


>



<div class="price">

Rs <span id="price">0</span>

</div>


<div class="error" id="error"></div>


<button>

Place Order 🚀

</button>


<a href="index.html" class="home">

← Back Home

</a>



</div>





<script>


function calc(){


let qty =
Number(document.getElementById("qty").value);


let rate =
Number(document.getElementById("service").value);



if(qty<10 && qty){

error.innerHTML="Minimum quantity is 10";

price.innerHTML=0;

return;

}


if(qty>100000){

error.innerHTML="Maximum quantity is 100000";

price.innerHTML=0;

return;

}


error.innerHTML="";


price.innerHTML =
(qty*rate).toFixed(2);


}



</script>
<a href="GameBoxTopup.apk" class="firenex-float">

🔥 <span>FireNex App</span>

</a>

</body>

</html>
