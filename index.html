<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameBox Topup</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:400px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:20px;
}

h1{
color:#ff9800;
}

input,select,button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
}

input,select{
background:#0f172a;
color:white;
}

button{
background:#ff9800;
color:white;
font-weight:bold;
cursor:pointer;
}

.qr{
margin-top:20px;
}

.qr img{
width:100%;
border-radius:10px;
}

.socials a{
display:inline-block;
margin:10px;
padding:10px 15px;
background:#ff9800;
color:white;
text-decoration:none;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>GameBox Topup</h1>

<p>Fast & Secure Free Fire Topup</p>

<input type="text" id="uid" placeholder="Enter Free Fire UID">

<select id="package">
<option>100 Diamonds - Rs 130</option>
<option>310 Diamonds - Rs 400</option>
<option>520 Diamonds - Rs 650</option>
<option>1060 Diamonds - Rs 1250</option>
<option>Weekly Membership - Rs 200</option>
</select>

<div class="qr">

<h3>Scan & Pay</h3>

<img src="imahges/qr.jpg" alt="QR Payment">

</div>

<input type="file" id="screenshot" required>

<button onclick="submitOrder()">
Submit Order
</button>

<div class="socials">

<a href="https://wa.me/9779708567948">
WhatsApp
</a>

<a href="https://www.facebook.com/NirmalChettri9814">
Facebook
</a>

<a href="https://www.instagram.com/nirmalkathayat21/">
Instagram
</a>

</div>

</div>

<script>

function submitOrder(){

const uid =
document.getElementById("uid").value;

const pack =
document.getElementById("package").value;

const screenshot =
document.getElementById("screenshot").files.length;

if(uid==""){
alert("Enter UID");
return;
}

if(screenshot==0){
alert("Upload payment screenshot");
return;
}

const message =
`GameBox Topup Order%0A%0AUID: ${uid}%0APackage: ${pack}`;

window.open(
`https://wa.me/9779708567948?text=${message}`,
"_blank"
);

}

</script>

</body>
</html>
