<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>FireNex TikTok</title>

<link rel="icon" type="image/png" href="icon.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#050816;
color:white;

display:flex;
justify-content:center;
align-items:center;

height:100vh;
overflow:hidden;

}

body::before{

content:"";

position:absolute;

width:350px;
height:350px;

background:#ff0050;

filter:blur(120px);

top:-100px;
left:-100px;

opacity:.4;

}

body::after{

content:"";

position:absolute;

width:350px;
height:350px;

background:#00f2ea;

filter:blur(120px);

bottom:-100px;
right:-100px;

opacity:.4;

}

.box{

position:relative;

z-index:2;

width:420px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,.1);

padding:35px;

border-radius:30px;

text-align:center;

box-shadow:0 20px 60px rgba(0,0,0,.5);

}

.box img{

width:90px;

margin-bottom:15px;

}

h1{

font-size:38px;

color:#ff9800;

margin-bottom:10px;

}

h2{

font-size:26px;

margin-bottom:20px;

}

p{

color:#cbd5e1;

line-height:28px;

margin-bottom:25px;

}

.badge{

display:inline-block;

padding:10px 18px;

border-radius:30px;

background:#ef4444;

font-weight:bold;

margin-bottom:25px;

}

a{

display:inline-block;

padding:14px 26px;

border-radius:14px;

text-decoration:none;

background:#2563eb;

color:white;

font-weight:bold;

transition:.3s;

}

a:hover{

transform:translateY(-4px);

}

.app{

position:fixed;

left:20px;
bottom:20px;

background:#2563eb;

color:white;

padding:12px 18px;

border-radius:30px;

text-decoration:none;

font-weight:bold;

box-shadow:0 8px 20px rgba(0,0,0,.35);

}

</style>

</head>

<body>

<div class="box">

<img src="icon.png">

<h1>🔥 FireNex</h1>

<div class="badge">
COMING SOON
</div>

<h2>TikTok Services</h2>

<p>

TikTok Likes, Views and Followers
will be available very soon.

We are preparing high-quality,
non-drop services.

</p>

<a href="index.html">
⬅ Back Home
</a>

</div>

<a href="GameBoxTopup.apk" class="app">
📱 FireNex App
</a>

</body>
</html>
