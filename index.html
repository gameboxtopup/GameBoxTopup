<body>

<script type="module">


import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAT1jHTWbIO8u-pMfF7liOz4rB6WIXSrIQ",

authDomain: "gamebox-58ca6.firebaseapp.com",

projectId: "gamebox-58ca6",

storageBucket: "gamebox-58ca6.firebasestorage.app",

messagingSenderId: "562074668636",

appId: "1:562074668636:web:0fea328c5beefb4b5d2099"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);


const db = getFirestore(app);
window.previewImage = function(event){

const file = event.target.files[0];

if(!file){
return;
}

const reader = new FileReader();

reader.onload = function(e){

const preview =
document.getElementById("preview");

preview.src = e.target.result;

preview.style.display = "block";

};

reader.readAsDataURL(file);

}


onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href = "/login.html";

}

});

window.logout = async function(){

await signOut(auth);

window.location.href = "/login.html";

}

window.submitOrder = async function(){
const submitBtn =
document.getElementById("submitBtn");

if(submitBtn.disabled) return;

submitBtn.disabled = true;
submitBtn.innerText = "Submitting...";
const uid =
document.getElementById("uid").value;

const pack =
document.getElementById("package").value;

const screenshot =
document.getElementById("screenshot").files[0];

if(uid.trim()==""){
alert("Enter UID");
return;
}

if(!screenshot){
alert("Upload payment screenshot");
return;
}

try{

const formData = new FormData();

formData.append("file", screenshot);

formData.append("upload_preset", "gamebox");

const response = await fetch(

"https://api.cloudinary.com/v1_1/dsfhvnlqw/image/upload",

{
method:"POST",
body:formData
}

);

const data = await response.json();

await addDoc(collection(db,"orders"),{

uid: uid,

package: pack,

screenshot: data.secure_url,

status: "Processing",

email: auth.currentUser.email,

time: new Date()

});
const webhook = "https://discord.com/api/webhooks/1510486025796059296/c1VoFveIsVLQRhjD6wqtgPOtBxvizZulBNiL0OZqdcDb114eElUDB4RhodsQ4SezrRLh";

await fetch(webhook,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
content:
`🎮 New GameBox Order

📧 Email: ${auth.currentUser.email}
🆔 UID: ${uid}
💎 Package: ${pack}
📊 Status: Processing`
})
});

document.body.innerHTML = `

<div style="

background:#0f172a;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
padding:20px;

">

<div style="

background:#1e293b;
padding:30px;
border-radius:20px;
max-width:400px;
text-align:center;
color:white;

">

<h1 style="color:#00ff88;">
Order Submitted Successfully!
</h1>

<p style="margin-top:15px;line-height:25px;">

If your order gets delayed more than 30 minutes,
message us on WhatsApp.

Otherwise please wait some time.

</p>

<a href="https://wa.me/9779708567948"

style="

display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#ff9800;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;

">

Contact WhatsApp

</a>

<br><br>

<a href="/"

style="

display:inline-block;
padding:12px 20px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;

">

Back To Home

</a>

</div>

</div>

`;

}
catch(error){

submitBtn.disabled = false;
submitBtn.innerText = "Submit Order";

alert(error.message);

}

}

</script>
