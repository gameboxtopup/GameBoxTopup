<script type="module">


import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAT1jHTWbIO8u-pMfF7liOz4rB6WIXSrIQ",

authDomain: "gamebox-58ca6.firebaseapp.com",

projectId: "gamebox-58ca6",

storageBucket: "gamebox-58ca6.firebasestorage.app",

messagingSenderId: "562074668636",

appId: "1:562074668636:web:0fea328c5beefb4b5d2099"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

document.getElementById("userEmail").innerHTML =
"Email: " + auth.currentUser.email;

const db = getFirestore(app);


onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href = "/login.html";

}

});

window.logout = function(){

signOut(auth);

}

window.submitOrder = async function(){

const uid =
document.getElementById("uid").value;

const pack =
document.getElementById("package").value;

const screenshot =
document.getElementById("screenshot").files[0];

if(uid.trim()==""){
alert("Enter UID");
return;
}

if(!screenshot){
alert("Upload payment screenshot");
return;
}

try{

const formData = new FormData();

formData.append("file", screenshot);

formData.append("upload_preset", "gamebox");

const response = await fetch(

"https://api.cloudinary.com/v1_1/dsfhvnlqw/image/upload",

{
method:"POST",
body:formData
}

);

const data = await response.json();

await addDoc(collection(db,"orders"),{

uid: uid,

package: pack,

screenshot: data.secure_url,

status: "Processing",

email: auth.currentUser.email,

time: new Date()

});

document.body.innerHTML = `

</div>

`;

}
catch(error){

alert(error.message);

}

}
