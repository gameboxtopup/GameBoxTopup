<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>GameBox Signup</title>

<style>

body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
background:#1e293b;
padding:30px;
border-radius:20px;
width:350px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
color:#ff9800;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
font-size:15px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

.signup-btn{
background:#ff9800;
color:white;
}

.google-btn{
background:white;
color:black;
}

a{
color:#ff9800;
text-decoration:none;
}

p{
margin-top:20px;
font-size:14px;
}

</style>

</head>

<body>

<div class="box">

<h1>Create Account</h1>

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="password"
id="password"
placeholder="Enter Password">

<button
class="signup-btn"
onclick="signup()">

Create Account

</button>

<button
class="google-btn"
onclick="googleSignup()">

Continue With Google

</button>

<p>

Already have account?

<a href="/login.html">
Login
</a>

</p>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
sendEmailVerification,
GoogleAuthProvider,
signInWithPopup
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAT1jHTWbIO8u-pMfF7liOz4rB6WIXSrIQ",

authDomain: "gamebox-58ca6.firebaseapp.com",

projectId: "gamebox-58ca6",

storageBucket: "gamebox-58ca6.firebasestorage.app",

messagingSenderId: "562074668636",

appId: "1:562074668636:web:0fea328c5beefb4b5d2099"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.signup = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

if(email === "" || password === ""){

alert("Fill all fields");

return;

}

try{

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

await sendEmailVerification(
userCredential.user
);

alert("Verification email sent!");

window.location.href = "/login.html";

}
catch(error){

alert(error.message);

}

}

window.googleSignup = async function(){

const provider =
new GoogleAuthProvider();

try{

await signInWithPopup(auth,provider);

window.location.href = "/";

}
catch(error){

alert(error.message);

}

}

</script>

</body>

</html>
