<body>

<h1>GameBox Orders</h1>

<div class="orders" id="orders">

</div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAT1jHTWbIO8u-pMfF7liOz4rB6WIXSrIQ",

authDomain: "gamebox-58ca6.firebaseapp.com",

projectId: "gamebox-58ca6",

storageBucket: "gamebox-58ca6.firebasestorage.app",

messagingSenderId: "562074668636",

appId: "1:562074668636:web:0fea328c5beefb4b5d2099"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const ordersDiv =
document.getElementById("orders");

onSnapshot(collection(db,"orders"),(snapshot)=>{

ordersDiv.innerHTML = "";

snapshot.forEach((orderDoc)=>{

const data = orderDoc.data();

ordersDiv.innerHTML += `

<div class="card">

<p><b>Email:</b> ${data.email}</p>

<p><b>UID:</b> ${data.uid}</p>

<p><b>Package:</b> ${data.package}</p>

<p>
<b>Status:</b>

<span style="color:orange;">
${data.status || "Processing"}
</span>

</p>

<a href="${data.screenshot}" target="_blank"

style="

display:inline-block;
margin-top:10px;
padding:10px 15px;
background:#ff9800;
color:white;
text-decoration:none;
border-radius:10px;

">

Open Screenshot

</a>

<button onclick="completeOrder('${orderDoc.id}')"

style="

display:block;
margin-top:10px;
padding:10px 15px;
background:green;
color:white;
border:none;
border-radius:10px;
cursor:pointer;

">

Completed

</button>

<button onclick="rejectOrder('${orderDoc.id}')"

style="

display:block;
margin-top:10px;
padding:10px 15px;
background:red;
color:white;
border:none;
border-radius:10px;
cursor:pointer;

">

Rejected

</button>

<button onclick="processingOrder('${orderDoc.id}')"

style="

display:block;
margin-top:10px;
padding:10px 15px;
background:orange;
color:black;
border:none;
border-radius:10px;
cursor:pointer;

">

Processing

</button>

<button onclick="deleteOrder('${orderDoc.id}')"

style="

display:block;
margin-top:10px;
padding:10px 15px;
background:#444;
color:white;
border:none;
border-radius:10px;
cursor:pointer;

">

Delete Permanently

</button>

</div>

`;

});

});

window.completeOrder = async function(id){

await updateDoc(doc(db,"orders",id),{
status:"Completed"
});

}

window.rejectOrder = async function(id){

await updateDoc(doc(db,"orders",id),{
status:"Rejected"
});

}

window.processingOrder = async function(id){

await updateDoc(doc(db,"orders",id),{
status:"Processing"
});

}

window.deleteOrder = async function(id){

await deleteDoc(doc(db,"orders",id));

}

</script>

</body>
