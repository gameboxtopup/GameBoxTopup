<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameBox Topup</title>

<style>

body{
background:#0f172a;

}

<body>

<h1>GameBox Topup</h1>
<p>Fast & Secure Free Fire Diamond Topup</p>

<div class="box">

<input type="text" id="uid" placeholder="Enter Free Fire UID">

<select id="package">
<option>100 Diamonds</option>
<option>310 Diamonds</option>
<option>520 Diamonds</option>
<option>1060 Diamonds</option>
</select>

<button onclick="submitOrder()">
Order Now

<a href="#">Facebook</a>

<script>

function submitOrder(){

const uid =
document.getElementById("uid").value;

const pack =
document.getElementById("package").value;

if(uid==""){
alert("Please Enter UID");
return;
}

alert(
"Order Submitted Successfully!\n\nUID: "
+ uid +
"\nPackage: " +
pack
);

}

</script>
