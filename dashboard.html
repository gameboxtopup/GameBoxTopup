<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameBox Dashboard</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo{
color:#ff9800;
font-size:28px;
font-weight:bold;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-top:20px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#ff9800;
color:white;
cursor:pointer;
font-weight:bold;
}

#ordersContainer{
margin-top:20px;
}

.empty{
background:#0f172a;
padding:20px;
border-radius:10px;
text-align:center;
margin-top:10px;
}

</style>
</head>

<body>

<div class="header">

<div class="logo">
GameBox
</div>

<button onclick="window.location.href='index.html'">
New Topup
</button>

</div>

<div class="card">

<h2>User Profile</h2>

<p id="userEmail">
Loading...
</p>

<p>
Account Status: Active
</p>

</div>

<div class="card">

<h2>My Orders</h2>

<div id="ordersContainer">

<div class="empty">
No Orders Found
</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAT1jHTWbIO8u-pMfF7liOz4rB6WIXSrIQ",

authDomain: "gamebox-58ca6.firebaseapp.com",

projectId: "gamebox-58ca6",

storageBucket: "gamebox-58ca6.firebasestorage.app",

messagingSenderId: "562074668636",

appId: "1:562074668636:web:0fea328c5beefb4b5d2099"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("userEmail").innerHTML =
"Email: " + user.email;

}else{

window.location.href = "/login.html";

}

});

</script>

</body>
</html>
