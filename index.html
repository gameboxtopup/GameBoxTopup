<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameBox Topup</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:400px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:20px;
}

h1{
color:#ff9800;
}

input,select,button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
}

input,select{
background:#0f172a;
color:white;
}

button{
background:#ff9800;
color:white;
font-weight:bold;
cursor:pointer;
}

.qr{
margin-top:20px;
}

.qr img{
width:100%;
border-radius:10px;
}

.socials a{
display:inline-block;
margin:10px;
padding:10px 15px;
background:#ff9800;
color:white;
text-decoration:none;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>GameBox Topup</h1>

<p>Fast & Secure Free Fire Topup</p>

<input type="text" id="uid" placeholder="Enter Free Fire UID">

<select id="package">
<option>100 Diamonds - Rs 130</option>
<option>310 Diamonds - Rs 400</option>
<option>520 Diamonds - Rs 650</option>
<option>1060 Diamonds - Rs 1250</option>
<option>Weekly Membership - Rs 200</option>
</select>

<div class="qr">

<h3>Scan & Pay</h3>

<img src="imahges/qr.jpg" alt="QR Payment">

</div>

<input type="file" id="screenshot" required>

<p style="font-size:13px;color:#ff9800;margin-top:8px;">
Enter Payment Screenshot^
</p>
<p style="font-size:13px;color:#ff4d4d;margin-top:15px;line-height:20px;"> NOTE: If you upload wrong screenshot of payment or entered wrong UID, contact on WhatsApp otherwise there will be no topup on your ID. </p>
<button type="button" onclick="submitOrder()"> Submit Order </button>
<div class="socials">

<a href="https://wa.me/9779708567948">
WhatsApp
</a>

<a href="https://www.facebook.com/NirmalChettri9814">
Facebook
</a>

<a href="https://www.instagram.com/nirmalkathayat21/">
Instagram
</a>

</div>

</div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAT1jHTWbIO8u-pMfF7liOz4rB6WIXSrIQ",

authDomain: "gamebox-58ca6.firebaseapp.com",

projectId: "gamebox-58ca6",

storageBucket: "gamebox-58ca6.firebasestorage.app",

messagingSenderId: "562074668636",

appId: "1:562074668636:web:0fea328c5beefb4b5d2099"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.submitOrder = async function(){

const uid =
document.getElementById("uid").value;

const pack =
document.getElementById("package").value;

const screenshot =
document.getElementById("screenshot").files[0];

if(uid.trim()==""){
alert("Enter UID");
return;
}

if(!screenshot){
alert("Upload payment screenshot");
return;
}

try{

await addDoc(collection(db,"orders"),{

uid: uid,

package: pack,

screenshot: screenshot.name,

time: new Date()

});

alert("Order Submitted Successfully!");

}
catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
