<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>GameBox Login</title>

<style>

body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
background:#1e293b;
padding:30px;
border-radius:20px;
width:350px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
color:#ff9800;
margin-bottom:25px;
}

input,button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:15px;
box-sizing:border-box;
}

input{
background:#0f172a;
color:white;
outline:none;
}

button{
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
opacity:0.9;
}

.email{
background:#2563eb;
color:white;
}

.google{
background:white;
color:black;
}

.phone{
background:#22c55e;
color:white;
}

.or{
margin-top:20px;
margin-bottom:5px;
opacity:0.7;
font-size:14px;
}

#error{
color:#ff4d4d;
font-size:14px;
margin-top:10px;
display:none;
}

</style>

</head>

<body>

<div class="box">

<h1>GameBox Login</h1>

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="password"
id="password"
placeholder="Enter Password">

<p id="error">
Wrong Email Or Password
</p>


<button
class="email"
onclick="emailLogin()">

Login With Email

</button>


<p style="margin-top:15px;">

<a
href="#"
onclick="forgotPassword()"

style="

color:#ff9800;
text-decoration:none;

">

Forgot Password?

</a>

</p>


<p style="margin-top:15px;font-size:14px;">

Don't have account?

<a href="/signup.html"

style="

color:#ff9800;
text-decoration:none;
font-weight:bold;

">

Create Account

</a>

</p>

<div class="or">

OR

</div>

<button
class="google"
onclick="googleLogin()">

Continue With Google

</button>

<button
class="phone"
onclick="openPhoneLogin()">

Continue With Phone Number

</button>

<div
id="phoneBox"
style="display:none;">

<input
type="text"
id="phone"
placeholder="+97798XXXXXXXX">

<div id="recaptcha-container"></div>

<button onclick="sendOTP()">

Send OTP

</button>

<input
type="text"
id="otp"
placeholder="Enter OTP">

<button onclick="verifyOTP()">

Verify OTP

</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
RecaptchaVerifier,
signInWithPhoneNumber,
signInWithEmailAndPassword,
sendPasswordResetEmail
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";


const firebaseConfig = {

apiKey: "AIzaSyAT1jHTWbIO8u-pMfF7liOz4rB6WIXSrIQ",

authDomain: "gamebox-58ca6.firebaseapp.com",

projectId: "gamebox-58ca6",

storageBucket: "gamebox-58ca6.firebasestorage.app",

messagingSenderId: "562074668636",

appId: "1:562074668636:web:0fea328c5beefb4b5d2099"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.emailLogin = async function(){

const email =
document.getElementById("email");

const password =
document.getElementById("password");

const error =
document.getElementById("error");

email.style.border = "none";

password.style.border = "none";

error.style.display = "none";

if(email.value.trim() === ""){

error.innerHTML =
"Enter Email";

error.style.display =
"block";

email.style.border =
"2px solid red";

return;

}

if(password.value.trim() === ""){

error.innerHTML =
"Enter Password";

error.style.display =
"block";

password.style.border =
"2px solid red";

return;

}

try{

await signInWithEmailAndPassword(
auth,
email.value,
password.value
);

window.location.href = "/";

}

catch(err){

error.innerHTML =
"Wrong Email Or Password";

error.style.display =
"block";

email.style.border =
"2px solid red";

password.style.border =
"2px solid red";

}

}

window.forgotPassword = async function(){

const email =
document.getElementById("email").value;

if(email.trim() === ""){

alert("Enter your email first");

return;

}

try{

await sendPasswordResetEmail(
auth,
email
);

alert(
"Password reset email sent!"
);

}
catch(error){

alert(
"Failed to send reset email"
);

}

}

window.googleLogin = async function(){





window.forgotPassword = async function(){

const email =
document.getElementById("email").value;

if(email.trim() === ""){

alert("Enter your email first");

return;

}

try{

await sendPasswordResetEmail(
auth,
email
);

alert(
"Password reset email sent!"
);

}
catch(error){

alert(
"Failed to send reset email"
);

}

}



const provider =
new GoogleAuthProvider();

try{

await signInWithPopup(
auth,
provider
);

window.location.href = "/";

}
catch(error){

document.getElementById(
"error"
).style.display = "block";

document.getElementById(
"error"
).innerHTML =
"Google Login Failed";

}

}

window.openPhoneLogin = function(){

document.getElementById(
"phoneBox"
).style.display = "block";

}

window.recaptchaVerifier =
new RecaptchaVerifier(
auth,
"recaptcha-container",
{}
);

window.sendOTP = async function(){

const phone =
document.getElementById("phone").value;

try{

const confirmationResult =
await signInWithPhoneNumber(
auth,
phone,
window.recaptchaVerifier
);

window.confirmationResult =
confirmationResult;

alert("OTP Sent!");

}
catch(error){

alert("Invalid Phone Number");

}

}

window.verifyOTP = async function(){

const otp =
document.getElementById("otp").value;

try{

await window.confirmationResult.confirm(
otp
);

window.location.href = "/";

}
catch(error){

alert("Wrong OTP");

}

}

</script>

</body>

</html>
