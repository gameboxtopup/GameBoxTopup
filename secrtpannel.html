<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameBox Admin</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
padding:20px;
}

h1{
text-align:center;
color:#ff9800;
margin-bottom:20px;
}

#search{
width:100%;
max-width:700px;
display:block;
margin:auto;
margin-bottom:20px;
padding:15px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

.orders{
display:grid;
gap:15px;
max-width:700px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
}

.card p{
margin:8px 0;
}

.btn{
display:block;
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
color:white;
}

.complete{
background:green;
}

.reject{
background:red;
}

.processing{
background:orange;
color:black;
}

</style>
</head>

<body>

<script>

const password = prompt("Enter Admin Password");

if(password !== "Divya@6/7"){

document.body.innerHTML = `
<h1 style="margin-top:100px;">
Access Denied
</h1>
`;

throw new Error("Wrong Password");

}

</script>

<h1>GameBox Orders</h1>

<input
type="text"
id="search"
placeholder="Search UID or Email">

<div class="orders" id="orders"></div>

<audio id="notifSound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAT1jHTWbIO8u-pMfF7liOz4rB6WIXSrIQ",

authDomain: "gamebox-58ca6.firebaseapp.com",

projectId: "gamebox-58ca6",

storageBucket: "gamebox-58ca6.firebasestorage.app",

messagingSenderId: "562074668636",

appId: "1:562074668636:web:0fea328c5beefb4b5d2099"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ordersDiv = document.getElementById("orders");
const searchInput = document.getElementById("search");

let allOrders = [];

function renderOrders(){

const search =
searchInput.value.toLowerCase();

ordersDiv.innerHTML = "";

allOrders.forEach(order=>{

if(
!String(order.uid).toLowerCase().includes(search)
&&
!String(order.email).toLowerCase().includes(search)
){
return;
}

ordersDiv.innerHTML += `

<div class="card">

<p><b>Email:</b> ${order.email}</p>

<p><b>UID:</b> ${order.uid}</p>

<p><b>Package:</b> ${order.package}</p>

<p><b>Status:</b> ${order.status}</p>

<a href="${order.screenshot}"
target="_blank"
style="
display:inline-block;
margin-top:10px;
padding:10px 15px;
background:#ff9800;
color:white;
text-decoration:none;
border-radius:10px;
">
Open Screenshot
</a>

<button
class="btn complete"
onclick="setStatus('${order.id}','Completed')">
Completed
</button>

<button
class="btn reject"
onclick="setStatus('${order.id}','Rejected')">
Rejected
</button>

<button
class="btn processing"
onclick="setStatus('${order.id}','Processing')">
Processing
</button>

</div>

`;

});

}

searchInput.addEventListener("input",renderOrders);

onSnapshot(collection(db,"orders"),(snapshot)=>{

const sound =
document.getElementById("notifSound");

if(window.lastOrderCount !== undefined){

if(snapshot.size > window.lastOrderCount){

sound.play();

}

}

window.lastOrderCount = snapshot.size;

allOrders = [];

snapshot.forEach((docSnap)=>{

allOrders.push({
id: docSnap.id,
...docSnap.data()
});

});

renderOrders();

});

window.setStatus = async function(id,status){

await updateDoc(doc(db,"orders",id),{
status: status
});

}

</script>

</body>
</html>
